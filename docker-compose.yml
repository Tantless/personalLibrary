services:
  postgres:
    image: postgres:17-alpine
    container_name: pkcs-postgres
    environment:
      POSTGRES_DB: pkcs
      POSTGRES_USER: pkcs
      POSTGRES_PASSWORD: pkcs
    ports:
      - "54329:5432"
    volumes:
      - pkcs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkcs -d pkcs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pkcs-postgres-data:

